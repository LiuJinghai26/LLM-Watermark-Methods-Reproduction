seed: 20250713
device: auto
model_cache_dir: models/hf

generation_model:
  name: sshleifer/tiny-gpt2
  torch_dtype: float32

oracle_model:
  name: sshleifer/tiny-gpt2
  torch_dtype: float32

dataset:
  source: local_jsonl
  path: data/toy_news.jsonl
  max_samples: 4

generation:
  max_new_tokens: 48
  do_sample: true
  temperature: 1.5
  top_p: 1.0
  top_k: 0

watermark:
  gamma: 0.25
  delta: 5.0
  key: 15485863
  window_size: 1
  entropy_threshold: 1.0
  entropy_type: shannon

methods:
  - name: KGW
    generation: kgw
    detector: kgw
  - name: SWEET
    generation: sweet
    detector: sweet
  - name: EWD
    generation: kgw
    detector: ewd
    reuse_generation_from: KGW
    entropy_type: spike
